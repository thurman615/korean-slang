<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C0530"/>
      <stop offset="100%" style="stop-color:#3D0A40"/>
    </linearGradient>
    <linearGradient id="fade2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.6)"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg2)"/>

  <circle cx="0" cy="0" r="160" fill="#FF5AAF" opacity="0.12"/>
  <circle cx="800" cy="450" r="200" fill="#FF5AAF" opacity="0.08"/>
  <circle cx="700" cy="80" r="80" fill="#FF5AAF" opacity="0.09"/>

  <!-- Big Korean watermark -->
  <text x="540" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="900"
        fill="#FF5AAF" opacity="0.18" text-anchor="middle">최애</text>

  <rect width="800" height="450" fill="url(#fade2)"/>

  <!-- Tag -->
  <rect x="36" y="34" width="120" height="30" rx="15" fill="#FF5AAF"/>
  <text x="96" y="54" font-family="system-ui, sans-serif" font-size="12" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="1">K-POP EDITION</text>

  <!-- Title -->
  <text x="40" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800"
        fill="white">K-pop Fan Slang</text>
  <text x="40" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="18"
        fill="#D8C0D8">Ultimate Fandom Terms Explained</text>

  <rect x="40" y="400" width="70" height="5" rx="2" fill="#FF5AAF"/>
  <text x="40" y="432" font-family="system-ui, sans-serif" font-size="13"
        fill="#9878A8">KoreanSlang.guide</text>

  <!-- Fandom slang decoration -->
  <text x="545" y="165" font-family="system-ui, sans-serif" font-size="26" font-weight="700"
        fill="white" opacity="0.35">입덕</text>
  <text x="595" y="205" font-family="system-ui, sans-serif" font-size="22" font-weight="700"
        fill="#FF5AAF" opacity="0.5">갓벽</text>
  <text x="555" y="242" font-family="system-ui, sans-serif" font-size="20"
        fill="white" opacity="0.3">덕질</text>
</svg>
