<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#051828"/>
      <stop offset="100%" style="stop-color:#0A2D50"/>
    </linearGradient>
    <linearGradient id="fade3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.6)"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg3)"/>

  <circle cx="0" cy="0" r="160" fill="#46AAFF" opacity="0.10"/>
  <circle cx="800" cy="450" r="200" fill="#46AAFF" opacity="0.07"/>

  <!-- Big Korean initial consonants watermark -->
  <text x="520" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="900"
        fill="#46AAFF" opacity="0.20" text-anchor="middle">ㅋㄹㅇ</text>

  <rect width="800" height="450" fill="url(#fade3)"/>

  <!-- Tag -->
  <rect x="36" y="34" width="126" height="30" rx="15" fill="#46AAFF"/>
  <text x="99" y="54" font-family="system-ui, sans-serif" font-size="12" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="1">SOCIAL MEDIA</text>

  <!-- Title with actual Korean chars -->
  <text x="40" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800"
        fill="white">ㅋㅋ ㄹㅇ ㅇㅇ</text>
  <text x="40" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700"
        fill="#46AAFF">초성 Abbreviations — Explained</text>
  <text x="40" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="16"
        fill="#A0C8E8">How Koreans text in shorthand</text>

  <rect x="40" y="408" width="70" height="5" rx="2" fill="#46AAFF"/>
  <text x="40" y="432" font-family="system-ui, sans-serif" font-size="13"
        fill="#607890">KoreanSlang.guide</text>

  <!-- Floating abbreviations -->
  <text x="545" y="160" font-family="system-ui, sans-serif" font-size="30" font-weight="700"
        fill="white" opacity="0.30">ㅂㅂ</text>
  <text x="600" y="205" font-family="system-ui, sans-serif" font-size="24" font-weight="700"
        fill="#46AAFF" opacity="0.45">ㄱㅊ</text>
  <text x="555" y="245" font-family="system-ui, sans-serif" font-size="22"
        fill="white" opacity="0.25">ㅠㅠ</text>
</svg>
